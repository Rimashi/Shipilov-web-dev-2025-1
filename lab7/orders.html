<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Orders page">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/orders.css">
    <title>Мои заказы - Food Construct</title>
</head>

<body>
    <div class="wrapper">
        <div class="menu__overlay" id="menu_overlay"></div>

        <header class="header">
            <div class="header__container _container">
                <div class="header__top">
                    <div class="header__logo">
                        <h1><a href="index.html">Food Construct</a></h1>
                    </div>

                    <button class="theme-toggle" id="themeToggle" type="button">🌙</button>
                </div>

                <div class="menu__icon" id="menuIcon">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <nav class="header__menu menu" id="headerMenu">
                    <ul class="menu__list">
                        <li class="menu__item"><a href="./index.html">О нас</a></li>
                        <li class="menu__item"><a href="./lunch.html">Собрать ланч</a></li>
                        <li class="menu__item menu__item--active"><a href="./orders.html">Мои заказы</a></li>
                        <li class="menu__item"><a href="#contacts">Контакты</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <main class="main">
            <div class="main__container _container">
                <div class="orders__header">
                    <h1>Мои заказы</h1>
                    <div class="orders__stats">
                        <div class="stat__card">
                            <span class="stat__number" id="activeOrdersCount">0</span>
                            <span class="stat__label">Активных заказов</span>
                        </div>
                        <div class="stat__card">
                            <span class="stat__number" id="totalOrdersCount">0</span>
                            <span class="stat__label">Всего заказов</span>
                        </div>
                    </div>
                </div>

                <div class="orders__tabs">
                    <button class="tab__btn tab__btn--active" data-tab="active" type="button">Текущие заказы</button>
                    <button class="tab__btn" data-tab="completed" type="button">Завершенные заказы</button>
                </div>

                <div class="orders__content">
                    <!-- Активные заказы -->
                    <div class="tab__content tab__content--active" id="activeOrders">
                        <div class="orders__list" id="activeOrdersList">
                            <!-- Заказы будут загружены через JS -->
                        </div>
                    </div>

                    <!-- Завершенные заказы -->
                    <div class="tab__content" id="completedOrders">
                        <div class="orders__list" id="completedOrdersList">
                            <!-- Заказы будут загружены через JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer" id="contacts">
            <div class="footer__info">
                <p>Позвонить нам:</p>
                <a class="phone_number" href="tel:+700000000000">+7-000-000-00-00</a>
            </div>
        </footer>
    </div>

    <script src="./scripts/main.js"></script>
    <script src="./scripts/notifications.js"></script>
    <script src="./scripts/orders.js"></script>
</body>

</html>
